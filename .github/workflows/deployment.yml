name: Push to Target Repository via SSH

on:
  push:
    branches:
      - main

jobs:
  push-to-repo:
    runs-on: ubuntu-latest
    environment: GITHUB_PUSH
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for accurate push

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set up Git
        run: |
          git config --global user.name "Ali Hyder"
          git config --global user.email "cw.alihyder@gmail.com"

      - name: Create temporary directory excluding deployment.yml
        run: |
          mkdir temp-repo
          rsync -av --exclude='.github/workflows/deployment.yml' --exclude='.git' ./ temp-repo/
          cd temp-repo
          git init
          git add .
          git commit -m "Latest Changes"

      - name: Push to target repository
        run: |
          cd temp-repo
          git remote add target git@github.com:remlyo-ai/remlyo-backend.git
          git push target main --force || { echo "Push failed"; exit 1; }