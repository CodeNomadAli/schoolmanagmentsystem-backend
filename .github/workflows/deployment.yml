name: Sync to Target Repository via SSH

on:
  push:
    branches:
      - main

jobs:
  push-to-repo:
    runs-on: ubuntu-latest
    environment: GITHUB_PUSH
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for accurate source repo access

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set up Git
        run: |
          git config --global user.name "Ali Hyder"
          git config --global user.email "cw.alihyder@gmail.com"

      - name: Clone target repository
        run: |
          git clone git@github.com:remlyo-ai/remlyo-backend.git temp-repo
          cd temp-repo
          git checkout main  # Ensure we're on the main branch

      - name: Sync source repository files excluding deployment.yml
        run: |
          rsync -av --delete --exclude='.github/workflows/deployment.yml' --exclude='.git' ../ temp-repo/
          cd temp-repo
          if git status --porcelain | grep .; then
            git add .
            git commit -m "Latest Update"
          else
            echo "No changes to commit"
          fi

      - name: Push to target repository
        run: |
          cd temp-repo
          git push origin main || { echo "Push failed"; exit 1; }