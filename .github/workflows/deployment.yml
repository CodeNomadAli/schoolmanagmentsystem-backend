name: Push Clean Code to Client Repo via SSH

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest
    environment: GITHUB_PUSH

    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to ensure all objects are available

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SS_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Prepare Clean Commit
        run: |
          git config --global user.name "Ali Hyder"
          git config --global user.email "cw.alihyder@gmail.com"

          # Remove .github directory to exclude workflows from client repo
          rm -rf .github

          # Add all files and create a new commit
          git add -A
          git commit -m "Updated changes" --allow-empty

      - name: Debug Repository State
        run: |
          git status
          git log --oneline -n 5
          git fsck --full  # Check for repository corruption

      - name: Push to Client Repo with New History
        run: |
          git remote add client git@github.com:remlyo-ai/remlyo-backend.git
          # Force push to overwrite client repo's main branch and its history
          git push --force client main:main || { echo "Push failed"; git status; exit 1; }

      - name: Cleanup
        run: |
          rm -rf ~/.ssh
